global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:3000']

  - job_name: 'workers'
    static_configs:
      - targets: ['workers:3002']

  - job_name: 'embedding'
    static_configs:
      - targets: ['embedding:8000']
